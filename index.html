<body>
<div id="archive-theme-bgs" style="display:none" aria-hidden="true">
  <img id="archive-bg-slate"  src="/themes/bg-1.png" alt="" />
  <img id="archive-bg-ivory"  src="/themes/bg-2.png" alt="" />
  <img id="archive-bg-forest" src="/themes/bg-3.png" alt="" />
  <img id="archive-bg-smoke"  src="/themes/bg-4.png" alt="" />
  <img id="archive-bg-dusk"   src="/themes/bg-5.png" alt="" />
  <img id="archive-bg-ember"  src="/themes/bg-6.png" alt="" />
</div>
<!-- External app icon preview — sits on the black workspace OUTSIDE the iPhone bezel.
     Auto-updates to match the active theme; user override saved in localStorage 'aevum_app_icon'. -->
<div id="external-app-icon" aria-hidden="true"
  style="position:fixed;top:22px;left:22px;z-index:200;
         display:flex;flex-direction:column;align-items:center;gap:8px;
         pointer-events:none;font-family:'Inter',sans-serif;">
  <img id="external-app-icon-img" src="/icons/icon-ivory.png" alt=""
    style="width:56px;height:56px;border-radius:14px;object-fit:cover;display:block;
           box-shadow:0 12px 32px rgba(0,0,0,0.6),inset 0 0.5px 0 rgba(255,255,255,0.18);" />
  <div style="font-size:10px;font-weight:500;letter-spacing:1.6px;color:rgba(255,255,255,0.6);">AĒVUM</div>
</div>

<!-- Side toggle: hide / show the SECONDARY preview iPhone (left edge) -->
<button id="toggle-secondary" type="button" aria-label="Toggle secondary preview"
  style="position:fixed;left:14px;top:50%;transform:translateY(-50%);z-index:1000;
         padding:14px 6px;border-radius:14px;border:none;cursor:pointer;
         background:rgba(255,240,220,0.08);color:#F5F0E8;
         font:600 10px/1.4 'Inter',sans-serif;letter-spacing:1.4px;
         backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
         box-shadow:0 0 0 1px rgba(255,240,220,0.25), 0 4px 14px rgba(0,0,0,0.3);
         display:flex;flex-direction:column;align-items:center;gap:8px;
         writing-mode:vertical-rl;text-orientation:mixed;">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="writing-mode:horizontal-tb;">
    <path d="M15 6l-6 6 6 6"/>
  </svg>
  <span id="toggle-secondary-label">HIDE LEFT</span>
</button>

<!-- Side toggle: hide / show the PRIMARY iPhone (right edge) -->
<button id="toggle-primary" type="button" aria-label="Toggle primary display"
  style="position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:1000;
         padding:14px 6px;border-radius:14px;border:none;cursor:pointer;
         background:rgba(255,240,220,0.08);color:#F5F0E8;
         font:600 10px/1.4 'Inter',sans-serif;letter-spacing:1.4px;
         backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
         box-shadow:0 0 0 1px rgba(255,240,220,0.25), 0 4px 14px rgba(0,0,0,0.3);
         display:flex;flex-direction:column;align-items:center;gap:8px;
         writing-mode:vertical-rl;text-orientation:mixed;">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="writing-mode:horizontal-tb;">
    <path d="M9 6l6 6-6 6"/>
  </svg>
  <span id="toggle-primary-label">HIDE RIGHT</span>
</button>

<div class="shell-container" id="shell-container">
  <!-- Secondary preview iPhone (left) — independent iframe, same app, hideable -->
  <div class="device-shell device-shell--secondary" aria-hidden="true">
    <div class="device-island" aria-hidden="true"></div>
    <iframe class="secondary-frame" src="?clean=1" title="App preview"
      style="position:absolute;inset:0;width:100%;height:100%;
             border:0;border-radius:54px;
             background:#050505;display:block;"></iframe>
  </div>

  <!-- Primary iPhone (right / center when alone) — main React app lives here -->
  <div class="device-shell device-shell--primary">
    <div class="device-island" aria-hidden="true"></div>
    <div class="device-side device-side--action" aria-hidden="true"></div>
    <div class="device-side device-side--volup" aria-hidden="true"></div>
    <div class="device-side device-side--voldn" aria-hidden="true"></div>
    <div class="device-side device-side--power" aria-hidden="true"></div>
    <div class="device-side device-side--camera" aria-hidden="true"></div>
    <div id="stage"><div id="frame"><div id="root"></div></div></div>
  </div>
</div>

<script>
  (function() {
    var params = new URLSearchParams(location.search);
    var isClean = params.get('clean') === '1';
    var container = document.getElementById('shell-container');
    var btnSec = document.getElementById('toggle-secondary');
    var btnPri = document.getElementById('toggle-primary');
    var labelSec = document.getElementById('toggle-secondary-label');
    var labelPri = document.getElementById('toggle-primary-label');

    // CLEAN MODE — secondary iframe loads this with ?clean=1 to skip its own bezel + secondary
    if (isClean) {
      document.body.classList.add('archive-clean');
      var secondary = document.querySelector('.device-shell--secondary');
      if (secondary) secondary.remove();
      if (btnSec) btnSec.remove();
      if (btnPri) btnPri.remove();
      return;
    }

    // Toggle state — persisted independently per side
    var KEY_SEC = 'aevum_hide_secondary';
    var KEY_PRI = 'aevum_hide_primary';

    function applySecondary(hidden) {
      container.classList.toggle('hidden-secondary', hidden);
      labelSec.textContent = hidden ? 'SHOW LEFT' : 'HIDE LEFT';
      try { localStorage.setItem(KEY_SEC, hidden ? '1' : '0'); } catch (e) {}
    }
    function applyPrimary(hidden) {
      container.classList.toggle('hidden-primary', hidden);
      labelPri.textContent = hidden ? 'SHOW RIGHT' : 'HIDE RIGHT';
      try { localStorage.setItem(KEY_PRI, hidden ? '1' : '0'); } catch (e) {}
    }

    var initSec = false, initPri = false;
    try {
      initSec = localStorage.getItem(KEY_SEC) === '1';
      initPri = localStorage.getItem(KEY_PRI) === '1';
    } catch (e) {}
    applySecondary(initSec);
    applyPrimary(initPri);

    btnSec.addEventListener('click', function() {
      applySecondary(!container.classList.contains('hidden-secondary'));
    });
    btnPri.addEventListener('click', function() {
      applyPrimary(!container.classList.contains('hidden-primary'));
    });

    // On a real touch phone, hide both toggles and force single (primary only)
    if (matchMedia('(hover: none) and (pointer: coarse) and (max-width: 500px)').matches) {
      btnSec.style.display = 'none';
      btnPri.style.display = 'none';
      applySecondary(true);
      applyPrimary(false);
    }
  })();
</script>
